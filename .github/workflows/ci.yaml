name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: python (lint + typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --all-packages --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy apps/api/src apps/worker/src packages/core/src
      - run: uv run pytest -q

  helm:
    name: helm (lint + template)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2
      - run: helm lint charts/liftwork
      - run: helm template charts/liftwork > /tmp/rendered.yaml
