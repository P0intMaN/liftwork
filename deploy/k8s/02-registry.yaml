# In-cluster registry for dev e2e.
#
# BuildKit pushes to `registry.liftwork.svc.cluster.local:5000`.
# kubelet pulls images via the *same* hostname; containerd is patched
# (see scripts/setup-kind-registry.sh) to mirror that hostname through
# the NodePort below at http://localhost:30500, which is the same
# registry serving over its in-cluster Service IP.
#
# Production installs use GHCR/ECR/Quay and skip this manifest entirely.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: liftwork
  labels:
    app.kubernetes.io/name: registry
    app.kubernetes.io/component: dev-registry
    app.kubernetes.io/managed-by: liftwork
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: registry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: registry
        app.kubernetes.io/component: dev-registry
    spec:
      containers:
        - name: registry
          image: registry:2.8.3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: http
              protocol: TCP
          env:
            - name: REGISTRY_HTTP_ADDR
              value: "0.0.0.0:5000"
            - name: REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY
              value: "/var/lib/registry"
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 1
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: liftwork
  labels:
    app.kubernetes.io/name: registry
    app.kubernetes.io/component: dev-registry
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: registry
  ports:
    - name: http
      port: 5000
      targetPort: http
      nodePort: 30500
      protocol: TCP
