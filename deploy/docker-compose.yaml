services:
  postgres:
    image: postgres:16-alpine
    container_name: liftwork-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: liftwork
      POSTGRES_PASSWORD: liftwork
      POSTGRES_DB: liftwork
    ports:
      - "5432:5432"
    volumes:
      - liftwork_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liftwork -d liftwork"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: liftwork-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - liftwork_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  liftwork_pg_data:
  liftwork_redis_data:
